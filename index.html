<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Battle — Битва пикселей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #1a1f2e;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .battle-fullscreen {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: #0f1219;
        }

        .top-bar {
            background: rgba(15, 18, 25, 0.98);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 100;
            flex-shrink: 0;
        }

        .logo h1 {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #ffffff, #b0b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 0.7rem;
            color: #ffffff;
            opacity: 0.7;
        }

        .auth-widget {
            background: #2a2f3e;
            padding: 5px 16px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid #9147ff;
            object-fit: cover;
            background: #2d2f3a;
        }

        .username {
            font-weight: bold;
            color: #ffffff;
            font-size: 0.9rem;
        }

        .logout-btn, .login-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 30px;
            transition: 0.2s;
        }

        .logout-btn {
            color: #ff9e8c;
        }

        .logout-btn:hover {
            background: rgba(255, 80, 80, 0.2);
        }

        .login-btn {
            background: #9147ff;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .login-btn:hover {
            background: #a970ff;
            transform: scale(0.97);
        }

        .toolbar {
            background: rgba(18, 22, 35, 0.95);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .palette {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 2px solid transparent;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .color-option.active {
            transform: scale(1.08);
            border: 3px solid white;
            box-shadow: 0 0 0 2px #9147ff;
        }

        .selected-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 40px;
        }

        .selected-info span {
            color: white;
        }

        .preview-color {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: 1px solid white;
        }

        .cooldown-indicator {
            background: #2a2f3e;
            padding: 5px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }

        .reset-btn {
            background: #2a2f3e;
            border: none;
            padding: 5px 14px;
            border-radius: 30px;
            color: #ffb347;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .reset-btn:hover {
            background: #3a405a;
        }

        .stats {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: white;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #0a0c12;
            cursor: grab;
        }

        .canvas-container:active {
            cursor: grabbing;
        }

        #battleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .message-area {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.8rem;
            color: white;
            pointer-events: none;
            z-index: 200;
            white-space: nowrap;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .zoom-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 200;
        }

        .zoom-btn {
            background: #2a2f3e;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px black;
        }

        .zoom-btn:hover {
            background: #9147ff;
        }

        .activity-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #88ffaa;
            font-family: monospace;
            max-width: 350px;
            overflow-x: auto;
            z-index: 200;
            pointer-events: none;
            white-space: nowrap;
        }

        .nickname-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e2438;
            border-radius: 32px;
            padding: 30px;
            width: 340px;
            text-align: center;
            border: 1px solid #9147ff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-content h3 {
            color: white;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: none;
            background: #2d2f3e;
            color: white;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        .modal-content input::placeholder {
            color: #888;
        }

        .modal-content button {
            background: #9147ff;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        @media (max-width: 800px) {
            .color-option { width: 30px; height: 30px; }
            .toolbar { padding: 6px 12px; }
            .stats { font-size: 0.7rem; }
            .message-area { white-space: nowrap; font-size: 0.7rem; }
            .activity-panel { font-size: 0.6rem; max-width: 200px; }
        }
    </style>
</head>
<body>
<div class="battle-fullscreen">
    <div class="top-bar">
        <div class="logo">
            <h1>⚔️ PIXEL BATTLE ⚔️</h1>
            <p>80x80 | битва за холст | кулдаун 3 сек</p>
        </div>
        <div class="auth-widget" id="authWidget"></div>
    </div>

    <div class="toolbar">
        <div class="palette" id="colorPalette"></div>
        <div class="selected-info">
            <span>🎨 текущий цвет</span>
            <div class="preview-color" id="previewColor"></div>
        </div>
        <div class="cooldown-indicator">
            🔥 <span id="cooldownText">готов к битве</span>
        </div>
        <div class="stats">
            <span>📊 пикселей: <span id="totalPixelsCount">0</span></span>
            <span>👥 онлайн: <span id="onlineCount">1</span></span>
            <button class="reset-btn" id="resetBoardBtn">♻️ СБРОС</button>
        </div>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <canvas id="battleCanvas"></canvas>
    </div>
    <div class="zoom-controls">
        <button class="zoom-btn" id="zoomOutBtn">−</button>
        <button class="zoom-btn" id="zoomInBtn">+</button>
        <button class="zoom-btn" id="resetViewBtn">⌗</button>
    </div>
    <div class="activity-panel" id="activityPanel">
        📡 последние действия...
    </div>
    <div class="message-area" id="globalMessage">
        🎮 Нажми "Войти" → выбери ник → ставь пиксели | кулдаун 3 сек
    </div>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    const MAP_WIDTH = 80;
    const MAP_HEIGHT = 80;
    const PIXEL_SIZE = 12;
    const COOLDOWN_SECONDS = 3;
    
    const PALETTE = [
        "#FF4444", "#FF8844", "#FFDD44", "#88FF44", "#44FF88",
        "#44DD88", "#44AAFF", "#8844FF", "#FF44CC", "#FFFFFF",
        "#222222", "#FF6699", "#44FFDD", "#FFAA44", "#AA44FF",
        "#AA8866", "#66CCAA", "#FF6B6B", "#4ECDC4", "#FFE66D"
    ];
    
    // ---------- ГЛОБАЛЬНОЕ СОСТОЯНИЕ ----------
    let pixelMap = [];
    let pixelAuthors = [];
    let totalPlaced = 0;
    let currentUser = null;
    let userCooldowns = new Map();
    let selectedColor = PALETTE[0];
    let lastActivity = [];
    
    // Canvas и трансформации
    let canvas, ctx, container;
    let scale = 0.7;
    let offsetX = 0, offsetY = 0;
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    
    // DOM элементы
    let colorPaletteDiv, previewColorDiv, cooldownSpan, totalPixelsSpan, onlineCountSpan, messageDiv, activityPanel;
    
    // Звук
    let audioCtx = null;
    let lastCooldownState = 0;
    let cooldownInterval = null;
    let simulationInterval = null;
    
    // ========== ИНИЦИАЛИЗАЦИЯ ПОЛЯ ==========
    function initMap() {
        pixelMap = new Array(MAP_WIDTH * MAP_HEIGHT);
        pixelAuthors = new Array(MAP_WIDTH * MAP_HEIGHT);
        for (let i = 0; i < pixelMap.length; i++) {
            pixelMap[i] = "#FFFFFF";
            pixelAuthors[i] = null;
        }
    }
    
    function saveToLocal() {
        localStorage.setItem("pixelBattleMap80", JSON.stringify(pixelMap));
        localStorage.setItem("pixelBattleAuthors80", JSON.stringify(pixelAuthors));
        localStorage.setItem("pixelBattleTotalPlaced80", totalPlaced);
        if (currentUser) {
            localStorage.setItem("pixelBattleUsername", currentUser.username);
        }
    }
    
    function loadFromLocal() {
        const saved = localStorage.getItem("pixelBattleMap80");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.length === MAP_WIDTH * MAP_HEIGHT) {
                    pixelMap = parsed;
                } else {
                    initMap();
                }
            } catch(e) { initMap(); }
        } else {
            initMap();
        }
        
        const savedAuthors = localStorage.getItem("pixelBattleAuthors80");
        if (savedAuthors) {
            try {
                const parsed = JSON.parse(savedAuthors);
                if (parsed.length === MAP_WIDTH * MAP_HEIGHT) {
                    pixelAuthors = parsed;
                }
            } catch(e) { }
        }
        
        const savedTotal = localStorage.getItem("pixelBattleTotalPlaced80");
        totalPlaced = savedTotal ? parseInt(savedTotal) : 0;
        
        const savedUsername = localStorage.getItem("pixelBattleUsername");
        if (savedUsername && !currentUser) {
            currentUser = {
                username: savedUsername,
                avatar: `https://ui-avatars.com/api/?background=9147ff&color=fff&rounded=true&size=64&bold=true&fontsize=0.6&name=${encodeURIComponent(savedUsername.slice(0,2))}`,
                token: "saved_" + Date.now()
            };
            updateAuthUI();
            startCooldownTimerLoop();
            startSimulation();
        }
        
        updateStats();
        updateOnlineCount();
    }
    
    // ========== ОТРИСОВКА CANVAS ==========
    function drawCanvas() {
        if (!canvas || !ctx) return;
        const w = MAP_WIDTH * PIXEL_SIZE;
        const h = MAP_HEIGHT * PIXEL_SIZE;
        canvas.width = w;
        canvas.height = h;
        
        // Применяем трансформацию через CSS
        canvas.style.width = `${w * scale}px`;
        canvas.style.height = `${h * scale}px`;
        canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        canvas.style.transformOrigin = "0 0";
        
        // Рисуем пиксели
        for (let row = 0; row < MAP_HEIGHT; row++) {
            for (let col = 0; col < MAP_WIDTH; col++) {
                const idx = row * MAP_WIDTH + col;
                ctx.fillStyle = pixelMap[idx];
                ctx.fillRect(col * PIXEL_SIZE, row * PIXEL_SIZE, PIXEL_SIZE - 0.5, PIXEL_SIZE - 0.5);
            }
        }
        
        // Черная сетка
        ctx.beginPath();
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= MAP_WIDTH; x++) {
            ctx.moveTo(x * PIXEL_SIZE, 0);
            ctx.lineTo(x * PIXEL_SIZE, h);
            ctx.stroke();
            ctx.moveTo(0, x * PIXEL_SIZE);
            ctx.lineTo(w, x * PIXEL_SIZE);
            ctx.stroke();
        }
    }
    
    function clampTransform() {
        if (!container) return;
        const containerRect = container.getBoundingClientRect();
        const virtualWidth = MAP_WIDTH * PIXEL_SIZE * scale;
        const virtualHeight = MAP_HEIGHT * PIXEL_SIZE * scale;
        const maxOffsetX = Math.max(0, virtualWidth - containerRect.width);
        const maxOffsetY = Math.max(0, virtualHeight - containerRect.height);
        offsetX = Math.min(0, Math.max(-maxOffsetX, offsetX));
        offsetY = Math.min(0, Math.max(-maxOffsetY, offsetY));
        drawCanvas();
    }
    
    function zoomAtPoint(delta, clientX, clientY) {
        const oldScale = scale;
        let newScale = scale + delta;
        newScale = Math.min(4, Math.max(0.4, newScale));
        if (newScale === scale) return;
        
        const containerRect = container.getBoundingClientRect();
        const mouseX = clientX - containerRect.left;
        const mouseY = clientY - containerRect.top;
        
        const beforeX = (mouseX - offsetX) / oldScale;
        const beforeY = (mouseY - offsetY) / oldScale;
        
        scale = newScale;
        
        const afterX = (mouseX - offsetX) / scale;
        const afterY = (mouseY - offsetY) / scale;
        
        offsetX += (afterX - beforeX) * scale;
        offsetY += (afterY - beforeY) * scale;
        
        clampTransform();
    }
    
    function resetView() {
        scale = 0.7;
        offsetX = 0;
        offsetY = 0;
        clampTransform();
    }
    
    // ========== ТОЧНОЕ ОПРЕДЕЛЕНИЕ ПИКСЕЛЯ ==========
    // КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ: правильный расчет координат с учетом трансформации
    function getPixelIndexFromClick(clientX, clientY) {
        if (!canvas || !container) return -1;
        
        // Получаем bounding rect канваса
        const canvasRect = canvas.getBoundingClientRect();
        
        // Координаты клика относительно канваса (в пикселях экрана)
        const relativeX = clientX - canvasRect.left;
        const relativeY = clientY - canvasRect.top;
        
        // Проверяем, что клик внутри канваса
        if (relativeX < 0 || relativeY < 0 || relativeX > canvasRect.width || relativeY > canvasRect.height) {
            return -1;
        }
        
        // Переводим в координаты виртуального канваса (учитывая масштаб)
        // Важно: relativeX уже учитывает трансформацию, так как getBoundingClientRect возвращает 
        // реальные размеры на экране после трансформации
        const canvasVirtualX = relativeX / scale;
        const canvasVirtualY = relativeY / scale;
        
        // Определяем колонку и ряд
        const col = Math.floor(canvasVirtualX / PIXEL_SIZE);
        const row = Math.floor(canvasVirtualY / PIXEL_SIZE);
        
        if (col >= 0 && col < MAP_WIDTH && row >= 0 && row < MAP_HEIGHT) {
            return row * MAP_WIDTH + col;
        }
        return -1;
    }
    
    // ========== АКТИВНОСТЬ ==========
    function addActivity(message, isOwn = false) {
        const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        lastActivity.unshift({ text: `[${time}] ${message}`, isOwn });
        if (lastActivity.length > 12) lastActivity.pop();
        updateActivityPanel();
    }
    
    function updateActivityPanel() {
        if (!activityPanel) return;
        if (lastActivity.length === 0) {
            activityPanel.innerHTML = "📡 ожидание действий...";
            return;
        }
        activityPanel.innerHTML = "📡 " + lastActivity.map(a => a.text).join(" • ");
    }
    
    function updateOnlineCount() {
        if (!onlineCountSpan) return;
        // Считаем уникальных пользователей из кулдаунов + текущий
        const uniqueUsers = new Set([currentUser?.username].filter(Boolean));
        for (let [username] of userCooldowns) {
            if (username !== currentUser?.username) uniqueUsers.add(username);
        }
        onlineCountSpan.innerText = Math.min(uniqueUsers.size + Math.floor(Math.random() * 5), 25);
    }
    
    // ========== ЗВУК ==========
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }
    
    function playCooldownEndSound() {
        try {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = "sine";
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
            osc.start();
            osc.stop(now + 0.35);
        } catch(e) { console.warn("audio error"); }
    }
    
    // ========== КУЛДАУН ==========
    function isOnCooldown(username) {
        if (!username) return true;
        const last = userCooldowns.get(username);
        if (!last) return false;
        return (Date.now() - last) < COOLDOWN_SECONDS * 1000;
    }
    
    function getRemainingSeconds(username) {
        if (!username) return 0;
        const last = userCooldowns.get(username);
        if (!last) return 0;
        const elapsed = (Date.now() - last) / 1000;
        if (elapsed >= COOLDOWN_SECONDS) return 0;
        return Math.ceil(COOLDOWN_SECONDS - elapsed);
    }
    
    function updateCooldownUIAndSound() {
        if (!currentUser) {
            if (cooldownSpan) cooldownSpan.innerText = "🔒 войдите";
            return;
        }
        const remain = getRemainingSeconds(currentUser.username);
        const wasReady = (lastCooldownState === 0);
        const isReadyNow = (remain === 0);
        
        if (isReadyNow) {
            cooldownSpan.innerHTML = "✅ ГОТОВ!";
            if (!wasReady && currentUser) {
                playCooldownEndSound();
                showMessage("🔊 Кулдаун закончился! Можешь ставить пиксель!", 1200);
            }
            lastCooldownState = 0;
        } else {
            cooldownSpan.innerHTML = `⏳ ${remain} сек`;
            lastCooldownState = 1;
        }
    }
    
    function startCooldownTimerLoop() {
        if (cooldownInterval) clearInterval(cooldownInterval);
        cooldownInterval = setInterval(() => {
            updateCooldownUIAndSound();
        }, 200);
    }
    
    // ========== УСТАНОВКА ПИКСЕЛЯ ==========
    function placePixel(index, colorHex, username) {
        if (!currentUser || currentUser.username !== username) {
            showMessage("❌ Ошибка авторизации", 1500);
            return false;
        }
        if (isOnCooldown(username)) {
            const sec = getRemainingSeconds(username);
            showMessage(`⚠️ Кулдаун! Подожди ${sec} сек`, 1500);
            return false;
        }
        if (index < 0 || index >= pixelMap.length) return false;
        
        const row = Math.floor(index / MAP_WIDTH);
        const col = index % MAP_WIDTH;
        
        pixelMap[index] = colorHex;
        pixelAuthors[index] = username;
        userCooldowns.set(username, Date.now());
        totalPlaced++;
        saveToLocal();
        drawCanvas();
        updateStats();
        updateCooldownUIAndSound();
        
        addActivity(`${username} поставил пиксель на (${row},${col})`, true);
        showMessage(`🎨 ${username} поставил пиксель на (${row},${col})!`, 800);
        
        updateOnlineCount();
        return true;
    }
    
    // ========== СИМУЛЯЦИЯ ДРУГИХ УЧАСТНИКОВ ==========
    function startSimulation() {
        if (simulationInterval) clearInterval(simulationInterval);
        
        const fakeNames = ["Артем_86", "Pixel_Warrior", "Red_Fox", "Blue_Wizard", "Green_Dragon", 
                          "Shadow_King", "Fire_Mage", "Ice_Queen", "Thunder_God", "Dark_Knight",
                          "Moon_Light", "Star_Fall", "Crimson", "Azure", "Emerald"];
        
        simulationInterval = setInterval(() => {
            if (!currentUser) return;
            
            // 70% вероятность появления нового действия
            if (Math.random() > 0.7) return;
            
            let fakeName = fakeNames[Math.floor(Math.random() * fakeNames.length)];
            if (fakeName === currentUser.username) fakeName = fakeName + "_2";
            
            const randomIndex = Math.floor(Math.random() * pixelMap.length);
            const randomColor = PALETTE[Math.floor(Math.random() * PALETTE.length)];
            
            if (isOnCooldown(fakeName)) return;
            
            const row = Math.floor(randomIndex / MAP_WIDTH);
            const col = randomIndex % MAP_WIDTH;
            
            pixelMap[randomIndex] = randomColor;
            pixelAuthors[randomIndex] = fakeName;
            userCooldowns.set(fakeName, Date.now());
            totalPlaced++;
            saveToLocal();
            drawCanvas();
            updateStats();
            
            addActivity(`${fakeName} поставил пиксель на (${row},${col})`, false);
            updateOnlineCount();
        }, 3500);
    }
    
    function onCanvasClick(e) {
        if (!currentUser) {
            showMessage("🔐 Сначала войди (кнопка сверху)", 1500);
            return;
        }
        const idx = getPixelIndexFromClick(e.clientX, e.clientY);
        if (idx !== -1) {
            placePixel(idx, selectedColor, currentUser.username);
        }
    }
    
    // ========== АВТЕНТИФИКАЦИЯ ==========
    function showNicknameModal() {
        const modal = document.createElement('div');
        modal.className = 'nickname-modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>🎮 Авторизация</h3>
                <input type="text" id="nicknameInput" placeholder="Введите ваш никнейм" maxlength="20" autocomplete="off">
                <button id="confirmAuthBtn">⚡ Войти и рисовать</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const input = modal.querySelector('#nicknameInput');
        const confirmBtn = modal.querySelector('#confirmAuthBtn');
        
        input.focus();
        
        const doAuth = () => {
            let nickname = input.value.trim();
            if (!nickname) {
                nickname = "Воин_" + Math.floor(Math.random() * 1000);
            }
            currentUser = {
                username: nickname,
                avatar: `https://ui-avatars.com/api/?background=9147ff&color=fff&rounded=true&size=64&bold=true&fontsize=0.6&name=${encodeURIComponent(nickname.slice(0,2))}`,
                token: "auth_" + Date.now()
            };
            saveToLocal();
            updateAuthUI();
            showMessage(`✨ Добро пожаловать, ${nickname}! Ставь пиксели!`, 2500);
            updateCooldownUIAndSound();
            startCooldownTimerLoop();
            startSimulation();
            updateOnlineCount();
            modal.remove();
        };
        
        confirmBtn.addEventListener('click', doAuth);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doAuth();
        });
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem("pixelBattleUsername");
        updateAuthUI();
        updateStats();
        if (cooldownInterval) clearInterval(cooldownInterval);
        cooldownInterval = null;
        if (cooldownSpan) cooldownSpan.innerText = "🔒 войдите";
        if (simulationInterval) clearInterval(simulationInterval);
        simulationInterval = null;
        showMessage("👋 Вы вышли из аккаунта", 1500);
        updateOnlineCount();
    }
    
    function updateAuthUI() {
        const widget = document.getElementById("authWidget");
        if (!widget) return;
        if (!currentUser) {
            widget.innerHTML = `<button class="login-btn" id="twitchLoginBtn">🎮 Войти</button>`;
            const loginBtn = document.getElementById("twitchLoginBtn");
            if (loginBtn) {
                loginBtn.addEventListener("click", showNicknameModal);
            }
        } else {
            widget.innerHTML = `
                <div class="user-info">
                    <img class="avatar" src="${currentUser.avatar}" onerror="this.src='https://placehold.co/34x34/9147ff/white?text=U'">
                    <span class="username">${escapeHtml(currentUser.username)}</span>
                    <button class="logout-btn" id="logoutTwitchBtn">выйти</button>
                </div>
            `;
            const logoutBtn = document.getElementById("logoutTwitchBtn");
            if (logoutBtn) logoutBtn.addEventListener("click", logout);
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function updateStats() {
        if (totalPixelsSpan) totalPixelsSpan.innerText = totalPlaced;
    }
    
    function showMessage(msg, duration = 2000) {
        if (!messageDiv) return;
        messageDiv.innerHTML = `💬 ${msg}`;
        setTimeout(() => {
            if (messageDiv) messageDiv.innerHTML = `🎮 Нажми "Войти" → выбери ник → ставь пиксели | кулдаун ${COOLDOWN_SECONDS} сек`;
        }, duration);
    }
    
    function buildPalette() {
        if (!colorPaletteDiv) return;
        colorPaletteDiv.innerHTML = "";
        PALETTE.forEach(color => {
            const swatch = document.createElement("div");
            swatch.className = "color-option";
            if (color === selectedColor) swatch.classList.add("active");
            swatch.style.backgroundColor = color;
            swatch.addEventListener("click", () => {
                selectedColor = color;
                document.querySelectorAll(".color-option").forEach(el => el.classList.remove("active"));
                swatch.classList.add("active");
                if (previewColorDiv) previewColorDiv.style.backgroundColor = color;
            });
            colorPaletteDiv.appendChild(swatch);
        });
        if (previewColorDiv) previewColorDiv.style.backgroundColor = selectedColor;
    }
    
    function setupPanning() {
        if (!container) return;
        container.addEventListener("mousedown", (e) => {
            if (e.target === canvas || container.contains(e.target)) {
                isDragging = true;
                dragStart.x = e.clientX - offsetX;
                dragStart.y = e.clientY - offsetY;
                container.style.cursor = "grabbing";
                e.preventDefault();
            }
        });
        window.addEventListener("mousemove", (e) => {
            if (!isDragging) return;
            offsetX = e.clientX - dragStart.x;
            offsetY = e.clientY - dragStart.y;
            clampTransform();
        });
        window.addEventListener("mouseup", () => {
            isDragging = false;
            if (container) container.style.cursor = "grab";
        });
        container.addEventListener("wheel", (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.15 : 0.15;
            zoomAtPoint(delta, e.clientX, e.clientY);
        });
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        canvas = document.getElementById("battleCanvas");
        ctx = canvas.getContext("2d");
        container = document.getElementById("canvasContainer");
        colorPaletteDiv = document.getElementById("colorPalette");
        previewColorDiv = document.getElementById("previewColor");
        cooldownSpan = document.getElementById("cooldownText");
        totalPixelsSpan = document.getElementById("totalPixelsCount");
        onlineCountSpan = document.getElementById("onlineCount");
        messageDiv = document.getElementById("globalMessage");
        activityPanel = document.getElementById("activityPanel");
        
        loadFromLocal();
        drawCanvas();
        buildPalette();
        setupPanning();
        
        if (canvas) canvas.addEventListener("click", onCanvasClick);
        
        const zoomInBtn = document.getElementById("zoomInBtn");
        const zoomOutBtn = document.getElementById("zoomOutBtn");
        const resetViewBtn = document.getElementById("resetViewBtn");
        const resetBoardBtn = document.getElementById("resetBoardBtn");
        
        if (zoomInBtn) zoomInBtn.addEventListener("click", () => zoomAtPoint(0.2, container.clientWidth/2, container.clientHeight/2));
        if (zoomOutBtn) zoomOutBtn.addEventListener("click", () => zoomAtPoint(-0.2, container.clientWidth/2, container.clientHeight/2));
        if (resetViewBtn) resetViewBtn.addEventListener("click", resetView);
        if (resetBoardBtn) {
            resetBoardBtn.addEventListener("click", () => {
                if (confirm("Сбросить всё поле? Все пиксели станут белыми!")) {
                    initMap();
                    totalPlaced = 0;
                    saveToLocal();
                    drawCanvas();
                    updateStats();
                    showMessage("Поле полностью очищено! Все ячейки снова белые", 2000);
                    addActivity("Администратор очистил всё поле", false);
                }
            });
        }
        
        updateAuthUI();
        if (currentUser) {
            startCooldownTimerLoop();
            startSimulation();
        }
        
        document.body.addEventListener("click", () => {
            if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
        }, { once: true });
        
        setTimeout(() => {
            clampTransform();
        }, 100);
        
        setInterval(() => {
            updateOnlineCount();
        }, 5000);
    }
    
    window.addEventListener("resize", () => clampTransform());
    init();
</script>
</body>
</html>
